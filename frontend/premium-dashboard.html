<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralScore Premium Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg-color: #000;
  --text-color: #c0c0c0;
  --highlight-color: #00ff7f;
  --silver-color: #aaa;
}
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: var(--bg-color);
  color: var(--text-color);
  overflow-x: hidden;
}
h1, h2 {
  text-align: center;
  color: var(--highlight-color);
  margin: 0.5em 0;
  text-shadow: 0 0 5px #00ff7f;
}
.container {
  max-width: 1400px;
  margin: auto;
  padding: 20px;
}

/* Top 3 Panel */
.top3 {
  display: flex;
  justify-content: space-around;
  margin-bottom: 40px;
  position: relative;
}
.top-card {
  background: linear-gradient(145deg, #111, #222);
  border: 2px solid var(--highlight-color);
  border-radius: 15px;
  padding: 20px;
  width: 200px;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 15px #00ff7f;
}
.top-card h2 {
  margin-bottom: 10px;
}

/* Sparkles Particle */
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: var(--highlight-color);
  border-radius: 50%;
  opacity: 0.7;
  pointer-events: none;
  animation: float 3s linear infinite;
}
@keyframes float {
  0% { transform: translate(0,0) scale(1); opacity:1; }
  50% { transform: translate(50px,-50px) scale(0.5); opacity:0.5; }
  100% { transform: translate(100px,0) scale(0); opacity:0; }
}

/* Leaderboard */
.leaderboard {
  background: #111;
  border: 1px solid var(--silver-color);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 40px;
}
.leaderboard h2 { margin-bottom: 10px; }
.leaderboard ul {
  list-style: none;
  padding: 0;
}
.leaderboard li {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #222;
  transition: all 0.6s ease;
}

/* Video Cards */
.video-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}
.video-card {
  background: #111;
  border: 1px solid var(--silver-color);
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  transition: transform 0.3s, box-shadow 0.3s;
  box-shadow: 0 0 10px #00ff7f50;
}
.video-card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00ff7f80;
}
canvas { margin-top: 10px; }
</style>
</head>
<body>
<div class="container">
  <h1>ViralScore Premium Dashboard</h1>

  <!-- Top 3 Panel -->
  <div class="top3" id="top3-panel">
    <div class="top-card">
      <h2>🥇</h2>
      <p>Score: <span class="top-score" id="top1-score">0</span></p>
    </div>
    <div class="top-card">
      <h2>🥈</h2>
      <p>Score: <span class="top-score" id="top2-score">0</span></p>
    </div>
    <div class="top-card">
      <h2>🥉</h2>
      <p>Score: <span class="top-score" id="top3-score">0</span></p>
    </div>
  </div>

  <!-- Leaderboard -->
  <div class="leaderboard">
    <h2>Leaderboard</h2>
    <ul id="leaderboard-list"></ul>
  </div>

  <!-- Video Cards -->
  <div class="video-cards" id="video-cards"></div>
</div>

<script>
// --- Sparkles ---
const panel = document.getElementById('top3-panel');
function createParticles(count=30){
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random()*panel.offsetWidth+'px';
    p.style.top = Math.random()*panel.offsetHeight+'px';
    p.style.animationDuration = (Math.random()*3 + 2) + 's';
    panel.appendChild(p);
  }
}
createParticles();

// --- Video card creation ---
function createVideoCard(video){
  const card = document.createElement('div');
  card.className = 'video-card';

  const title = document.createElement('h3');
  title.textContent = video.title;
  card.appendChild(title);

  const doughnutCanvas = document.createElement('canvas');
  card.appendChild(doughnutCanvas);
  const lineCanvas = document.createElement('canvas');
  card.appendChild(lineCanvas);

  const doughnutChart = new Chart(doughnutCanvas, {
    type: 'doughnut',
    data: {
      labels: ['Likes','Shares','Comments'],
      datasets:[{
        data: [video.likes,video.shares,video.comments],
        backgroundColor:['#00ff7f','#c0c0c0','#555'],
        borderColor:'#111', borderWidth:2
      }]
    },
    options:{responsive:true,plugins:{legend:{labels:{color:'#c0c0c0'}}}}
  });

  const lineChart = new Chart(lineCanvas, {
    type:'line',
    data:{
      labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
      datasets:[{
        label:'Views Trend',
        data:Array.from({length:7},()=>Math.floor(Math.random()*100)),
        borderColor:'#00ff7f',
        backgroundColor:'rgba(0,255,127,0.2)',
        tension:0.4,
        fill:true
      }]
    },
    options:{responsive:true,
      plugins:{legend:{labels:{color:'#c0c0c0'}}},
      scales:{x:{ticks:{color:'#c0c0c0'}},y:{ticks:{color:'#c0c0c0'}}}
    }
  });

  card.updateCharts = function(newData){
    doughnutChart.data.datasets[0].data = [newData.likes,newData.shares,newData.comments];
    doughnutChart.update();
    lineChart.data.datasets[0].data = Array.from({length:7},()=>Math.floor(Math.random()*100));
    lineChart.update();
  }

  return card;
}

// --- Fetch live data ---
const videoCardsContainer = document.getElementById('video-cards');
const leaderboard = document.getElementById('leaderboard-list');

async function fetchViralScores() {
  try {
    const res = await fetch("https://viralscore-project.onrender.com/api/viral_scores")
    return await res.json();
  } catch (err) {
    console.error('Failed to fetch viral scores:', err);
    return [];
  }
}

async function loadDashboard() {
  const videos = await fetchViralScores();
  if(videos.length===0) return;

  // Sort by score descending
  videos.sort((a,b)=>b.score-a.score);

  // Top 3
  const top3 = videos.slice(0,3);
  top3.forEach((v,i)=>{
    document.getElementById(`top${i+1}-score`).textContent = v.score;
    document.querySelectorAll('.top-card')[i].querySelector('h2').textContent = ['🥇','🥈','🥉'][i] + ' ' + v.title;
  });

  // Leaderboard
  leaderboard.innerHTML = '';
  videos.forEach(v=>{
    const li = document.createElement('li');
    li.dataset.score=v.score;
    li.dataset.name=v.title;
    li.innerHTML = `${v.title} <span>${v.score}</span>`;
    leaderboard.appendChild(li);
  });

  // Video cards
  videoCardsContainer.innerHTML='';
  videos.forEach(video=>{
    const card = createVideoCard(video);
    card.updateCharts(video);
    videoCardsContainer.appendChild(card);
  });
}

// --- Auto-refresh ---
loadDashboard();
setInterval(loadDashboard,10000);
</script>
</body>
</html>
